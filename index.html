<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>《你好，新蒸程》整合包 · 问答汇总</title>
    <!-- 引入独立日志文件 -->
    <script src="changelog.js"></script>
    <style>
        :root {
            --green-dark: #1f6e43;
            --green-mid: #2b8c5e;
            --green-light: #eef2ff;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-primary: #1e2a3e;
            --text-secondary: #2c3f55;
            --text-muted: #4a627a;
            --border-light: #eef2f6;
            --border-lighter: #edf2f7;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius-lg: 1.25rem;
            --radius-xl: 28px;
            --radius-full: 40px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #1f6e43, #2b8c5e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header .badge {
            display: inline-block;
            background: #e9ecef;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #2c5a3e;
            margin-top: 0.6rem;
            font-weight: 500;
        }

        .sub {
            color: #4a627a;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* ========== 公告与日志区域 ========== */
        .announcement-row {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .notice-card,
        .changelog-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--green-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .notice-body {
            color: #2c3f55;
            line-height: 1.6;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .notice-footer {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px dashed #e2e8f0;
            padding-top: 0.8rem;
            flex-shrink: 0;
        }

        /* ========== 更新日志卡片 - 独立弹窗版 ========== */
        .changelog-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-item {
            border-radius: 10px;
            transition: background var(--transition-fast);
            cursor: pointer;
        }

        .log-item:hover {
            background: #f8fafc;
        }

        .log-summary {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            transition: background var(--transition-fast);
        }

        .log-summary:hover {
            background: #f1f5f9;
        }

        .log-date {
            background: #eef2ff;
            color: var(--green-mid);
            font-weight: 700;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.3px;
            min-width: 48px;
            text-align: center;
        }

        .log-title-text {
            flex: 1;
            font-size: 0.88rem;
            font-weight: 500;
            color: #1e293b;
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .changelog-toggle-more {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            padding: 7px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--green-mid);
            background: #f0f7f3;
            border: 1px solid #d1e7db;
            border-radius: 24px;
            cursor: pointer;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            align-self: flex-start;
            user-select: none;
        }

        .changelog-toggle-more:hover {
            background: #e3f2e9;
            border-color: #b8d9c5;
            color: #1c5e38;
            box-shadow: 0 1px 4px rgba(43, 140, 94, 0.12);
        }

        /* ========== 弹窗样式 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 1.5rem;
            max-width: 580px;
            width: 90%;
            max-height: 80vh;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #edf2f7;
        }

        .modal-header h3 {
            font-size: 1.1rem;
            color: #0f2b3d;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #64748b;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            line-height: 1.65;
            color: #2c3f55;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .modal-body .log-entry {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed #e2e8f0;
        }

        .modal-body .log-entry:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .modal-body .entry-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .modal-body .entry-date {
            background: #eef2ff;
            color: #2b8c5e;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .modal-body .entry-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e293b;
        }

        .modal-body .entry-detail {
            margin-top: 0.5rem;
            padding-left: 4px;
            font-size: 0.92rem;
            color: #4a627a;
            white-space: pre-wrap;
        }

        /* 工具栏等其他样式保持不变 */
        .toolbar {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            border: 1px solid #e2e8f0;
        }

        .search-box {
            flex: 3;
            min-width: 180px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 5px 12px;
            border-radius: var(--radius-full);
            margin: 6px 0;
        }

        #searchInput {
            border: none;
            background: transparent;
            padding: 10px 0;
            width: 100%;
            font-size: 0.95rem;
            outline: none;
            color: #1e293b;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 6px 0;
        }

        .filter-chip {
            background: #f1f5f9;
            border: none;
            padding: 6px 16px;
            border-radius: 32px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            color: #1e293b;
            white-space: nowrap;
        }

        .filter-chip.active {
            background: var(--green-mid);
            color: white;
            box-shadow: 0 2px 6px rgba(43, 140, 94, 0.2);
        }

        .stats {
            font-size: 0.85rem;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 1rem;
            color: #2d3e50;
        }

        .qa-grid { display: flex; flex-direction: column; gap: 1rem; }

        .qa-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 1.5rem;
            background: #f9fbfd;
            border-bottom: 1px solid var(--border-lighter);
        }

        .category-tag {
            background: var(--green-light);
            color: var(--green-dark);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
        }

        .question {
            font-weight: 700;
            font-size: 1rem;
            color: #0f2b3d;
            flex: 1;
        }

        .card-body { padding: 1.2rem 1.5rem 1.5rem; }
        .answer { color: #2c3f55; line-height: 1.55; font-size: 0.95rem; white-space: pre-wrap; }

        .footer {
            text-align: center;
            margin-top: 3rem;
            color: #5b6e8c;
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 2rem;
        }

        @media (max-width: 850px) {
            .announcement-row { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; padding: 0.8rem; }
            .filter-buttons { justify-content: center; }
            .log-title-text { font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ 《你好，新蒸程》整合包</h1>
            <div class="badge">航空学 | VOXY | 机械动力 | 社区问答精选</div>
            <div class="sub">基于玩家群聊整理 · 持续更新</div>
        </div>

        <!-- 公告与日志 -->
        <div class="announcement-row">
            <div class="notice-card">
                <div class="card-title">📢 置顶公告</div>
                <div class="notice-body">
                    欢迎来到官方问答库。在提问前，请先使用下方的搜索功能或分类筛选寻找答案。
                    大部分联机、崩溃、内存不足的问题都已在下方列出，可以搜索关键词。
                    <b>特别提醒：</b>严禁在群内散播整合包付费版本，本整合包完全免费。
                </div>
                <div class="notice-footer">⏱️ 最后编辑：2026年4月29日 01:00</div>
            </div>

            <div class="changelog-card">
                <div class="card-title">📝 更新日志(点击查看详细更新内容)</div>
                <ul class="changelog-list" id="changelogList"></ul>
                <button class="changelog-toggle-more" id="changelogToggleMore" style="display:none;">
                    查看全部更新 ▾
                </button>
            </div>
        </div>

        <!-- 搜索与筛选 -->
        <div class="toolbar">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="搜索问题或关键词...">
            </div>
            <div class="filter-buttons" id="filterButtons">
                <button data-cat="all" class="filter-chip active">全部</button>
                <button data-cat="基础与获取" class="filter-chip">📦 基础与获取</button>
                <button data-cat="运行与优化" class="filter-chip">⚙️ 运行与优化</button>
                <button data-cat="游戏内容与玩法" class="filter-chip">🎮 游戏内容与玩法</button>
                <button data-cat="Bug与问题" class="filter-chip">🐞 Bug与问题</button>
                <button data-cat="服务端与联机" class="filter-chip">🌐 服务端与联机</button>
                <button data-cat="模组与投稿" class="filter-chip">🧩 模组与投稿</button>
            </div>
        </div>

        <div class="stats" id="stats">加载中...</div>
        <div id="qaContainer" class="qa-grid"></div>
        <div class="footer">💡 提示：点击分类筛选 | 整合包最新资讯请留意群公告 · 感谢所有为爱发电的 contributors</div>
    </div>

    <!-- 弹窗容器（动态创建） -->
    <div id="modalContainer"></div>

    <script>
        // ========== 弹窗逻辑 ==========
        function openModal(title, contentHTML) {
            // 移除旧弹窗
            const oldModal = document.querySelector('.modal-overlay');
            if (oldModal) oldModal.remove();

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>📋 ${title}</h3>
                        <button class="modal-close">&times;</button>
                    </div>
                    <div class="modal-body">${contentHTML}</div>
                </div>
            `;
            document.getElementById('modalContainer').appendChild(overlay);

            // 关闭事件
            overlay.querySelector('.modal-close').addEventListener('click', closeModal);
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeModal();
            });
            document.addEventListener('keydown', handleEsc);
        }

        function closeModal() {
            const overlay = document.querySelector('.modal-overlay');
            if (overlay) overlay.remove();
            document.removeEventListener('keydown', handleEsc);
        }

        function handleEsc(e) {
            if (e.key === 'Escape') closeModal();
        }

        // 渲染单条日志详情弹窗
        function showLogDetail(log) {
            const content = `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:1rem;">
                    <span style="background:#eef2ff; color:#2b8c5e; font-weight:700; font-size:0.8rem; padding:3px 10px; border-radius:8px;">${escapeHtml(log.date)}</span>
                    <span style="font-weight:600; font-size:1rem;">${escapeHtml(log.title)}</span>
                </div>
                <div style="white-space:pre-wrap; font-size:0.95rem; color:#2c3f55; line-height:1.7;">${escapeHtml(log.detail)}</div>
            `;
            openModal('更新详情', content);
        }

        // 渲染全部日志列表弹窗
        function showAllLogs() {
            if (!changelogData || changelogData.length === 0) {
                openModal('更新日志', '<p style="text-align:center; color:#94a3b8;">暂无更新记录</p>');
                return;
            }
            let html = '';
            changelogData.forEach(log => {
                html += `
                    <div class="log-entry">
                        <div class="entry-header">
                            <span class="entry-date">${escapeHtml(log.date)}</span>
                            <span class="entry-title">${escapeHtml(log.title)}</span>
                        </div>
                        <div class="entry-detail">${escapeHtml(log.detail)}</div>
                    </div>
                `;
            });
            openModal('全部更新日志', html);
        }

        // ========== 更新日志卡片渲染 ==========
        const MAX_VISIBLE_LOGS = 3;

        function renderChangelogCard() {
            const listEl = document.getElementById('changelogList');
            const toggleBtn = document.getElementById('changelogToggleMore');

            if (!changelogData || changelogData.length === 0) {
                listEl.innerHTML = '<li style="color:#94a3b8; font-size:0.85rem; text-align:center;">暂无更新记录</li>';
                toggleBtn.style.display = 'none';
                return;
            }

            // 只显示前3条摘要
            const visibleLogs = changelogData.slice(0, MAX_VISIBLE_LOGS);
            let html = '';
            visibleLogs.forEach((log, index) => {
                html += `
                    <li class="log-item" data-log-index="${index}">
                        <div class="log-summary">
                            <span class="log-date">${escapeHtml(log.date)}</span>
                            <span class="log-title-text">${escapeHtml(log.title)}</span>
                        </div>
                    </li>
                `;
            });
            listEl.innerHTML = html;

            // 绑定点击事件
            document.querySelectorAll('#changelogList .log-item').forEach(item => {
                item.addEventListener('click', function() {
                    const idx = parseInt(this.getAttribute('data-log-index'));
                    showLogDetail(changelogData[idx]);
                });
            });

            // 控制“查看全部”按钮
            if (changelogData.length > MAX_VISIBLE_LOGS) {
                toggleBtn.style.display = 'inline-flex';
                toggleBtn.textContent = `查看全部更新 (共${changelogData.length}条) ▾`;
                // 移除旧事件，重新绑定
                toggleBtn.replaceWith(toggleBtn.cloneNode(true));
                const newToggleBtn = document.getElementById('changelogToggleMore');
                newToggleBtn.addEventListener('click', showAllLogs);
            } else {
                toggleBtn.style.display = 'none';
            }
        }

        // ========== 问答部分（保持不变） ==========
        const qaData = [
            { category: "基础与获取", question: "为什么我网盘下的整合包是图片？", answer: "在文件管理器里的上方栏有一个查看，点击这个查看后，你会看到在右边一点有一个文件拓展名，把这个勾选上，\n然后你就能看到你下载的整合包后面有一个.png的后缀，把这个后缀删除只留下.zip你就可以把这个整合包扔进pcl2里安装了" },
            { category: "基础与获取", question: "全量客户端和正式版的区别是啥？", answer: "\"全量客户端\"是解压即玩的个人/联机版本(全量包没更新)，而没标注全量包的正式版是需要导入pcl2安装的" },
            { category: "基础与获取", question: "整合包在哪里下载？", answer: "1. 主要方式：QQ群文件。\n2. 备用方式：夸克网盘（但曾多次出现文件被吞的情况，不稳定）。**注意：夸克网盘文件经常被吞，强烈建议从QQ群文件下载！**" },
            { category: "基础与获取", question: "夸克网盘的整合包或存档文件是空的/被吞了怎么办？", answer: "请直接前往QQ群文件下载。群文件内有整合包本体、服务端和已经预加载好的地图存档。如果网盘链接失效，这是正常现象，请勿反复询问，直接用群文件。" },
            { category: "基础与获取", question: "为啥pcl2显示安装失败？", answer: "网络问题，可以尝试在下载一次，或者使用更新后的全量包" },
            { category: "基础与获取", question: "怎么安装这个整合包？", answer: "1. 推荐使用 PCL2 启动器。将下载好的整合包压缩包（.zip）直接拖入PCL2界面即可自动安装。\n2. 群内也提供了\"全量客户端\"，下载解压后可直接使用。" },
            { category: "基础与获取", question: "这个整合包是基于哪个Minecraft版本的？", answer: "Minecraft 1.21.1（正式版）" },
            { category: "基础与获取", question: "这个整合包是免费的吗？", answer: "是的，完全免费。制作组和热心群友均为用爱发电。" },
            { category: "运行与优化", question: "玩这个整合包需要多少运行内存（RAM）？", answer: "建议分配12GB或以上。最低8GB可能会非常卡顿或崩溃。服务端同样建议分配12GB以上。" },
            { category: "运行与优化", question: "为什么我进游戏非常卡，帧数很低？", answer: "1. 分配的内存不足：请检查并增加PCL2启动器的内存分配，至少12G。\n2. 正在加载地图：首次进入或未使用预加载地图，游戏会在后台生成地形，导致卡顿。建议使用群文件里预加载好的存档。\n3. 配置较低：可以尝试关闭光影、关闭VOXY模组。" },
            { category: "运行与优化", question: "VOXY模组是什么？有什么用？", answer: "VOXY是一个客户端模组，它能加载和显示极远距离（最远数千格）的地形，让你看到史诗级的远景。它需要配合`Chunky`模组预先生成地形数据。" },
            { category: "运行与优化", question: "如何使用VOXY加载超远视距地形？", answer: "1. 简单方法：直接下载并使用群文件里已经跑好的地图存档。\n2. 自己动手：在游戏内依次输入指令：\n   `/chunky center` (设置中心)\n   `/chunky radius <半径>` (设置范围，如2000)\n   `/chunky shape square`\n   `/chunky start`\n   `/chunky confirm`\n   等待加载完成后，再输入 `/voxy import <存档名字>`。" },
            { category: "运行与优化", question: "我的VOXY加载到一半游戏崩溃/卡死了怎么办？", answer: "1. 检查内存：确保为游戏分配了至少12GB内存，加载超大地形内存占用会很高。\n2. 降低范围：尝试先加载较小的半径（如1000格），成功后再扩大范围。\n3. 使用现成存档：这是最省心省力的方式。\n4.可以尝试先禁用VOXY模组先使用预加载加载地地形（ 加载完后不要输入`/voxy import <存档名字>`），加载完之后再启动VOXY模组，然后再输入 `/voxy import <存档名字>`" },
            { category: "运行与优化", question: "我该用什么光影？为什么有些光影会出错？", answer: "1. 整合包自带和群文件里提供了多个兼容VOXY的光影包（如Photon），可以尝试更换。\n2. 兼容性问题：部分光影（如Derivative）已停更或与VOXY、YSM（模型模组）等模组存在兼容性问题，可能导致菜单空白或游戏崩溃。" },
            { category: "游戏内容与玩法", question: "开局送的那辆车怎么收起来/打掉？", answer: "使用同模组的\"撬棍\"。" },
            { category: "游戏内容与玩法", question: "任务奖励的飞机/飞艇怎么飞？", answer: "将烈焰蛋糕或者煤炭之类的放入引擎中作为燃料。" },
            { category: "游戏内容与玩法", question: "物理结构（飞船/汽车）上的无线红石遥控器用不了怎么办？", answer: "这是物理化后的已知兼容问题。可以改用无线打字机代替，或者自行研究配置文件修改方法。" },
            { category: "游戏内容与玩法", question: "游戏内的\"经验颗粒\"怎么一按W键（思索）就崩溃了？", answer: "这是已知的BUG，可能是模组兼容性问题。目前不建议对经验颗粒使用\"思索\"功能，等待后续修复。" },
            { category: "游戏内容与玩法", question: "我想要存储模组（如AE2），整合包里有吗？", answer: "包内没有。你可以自行添加，但因此产生的任何崩溃或兼容性问题，需要自己负责解决，制作组不提供支持。" },
            { category: "游戏内容与玩法", question: "为什么我把\"传送石碑\"物理化后就崩游戏了？", answer: "这也是一个已知问题。有社区Mod可以解决兼容性问题（如Waystones-Sable），可自行添加测试，稳定度不保证。" },
            { category: "Bug与问题", question: "游戏启动时报错\"missing tacz\"怎么办？", answer: "不用管它。因为TACZ枪械模组与当前整合包存在兼容性问题，作者已暂时将其删除等待修复，这个报错不影响正常游戏。" },
            { category: "Bug与问题", question: "用扳手加连锁采集，回收机械动力物品会直接消失？", answer: "这是已知BUG。作者建议安装 `create ultimine` 模组来解决，后续版本会补装。服务端已发布更新。" },
            { category: "Bug与问题", question: "\"简易存储\"模组的合成配方怎么和我以前玩的不一样？", answer: "作者为该模组更换了材质包，所以外观和配方感觉不一样，但核心功能是一样的。合成终端在游戏里叫\"合成器\"。" },
            { category: "Bug与问题", question: "游戏内光影设置界面是空白的，但可以盲点进入？", answer: "这通常是因为添加了YSM（模型模组）与Iris光影模组的UI渲染冲突导致的。可尝试删除YSM或等待修复补丁。\n YSM + Iris UI渲染层级冲突：菜单空白、看不见、但能点，就是两个UI在抢同一个渲染层、深度测试打架。\n关掉Iris的「菜单背景模糊」- 游戏 → 选项 → 辅助功能 → 菜单背景模糊：关" },
            { category: "服务端与联机", question: "服务端什么时候出？", answer: "群文件已经发布了服务端。**注意：** 初始版本存在气压模组(`flyhigher`)的Bug，已修复并重新上传，请下载最新版本。" },
            { category: "服务端与联机", question: "开服务端需要什么配置？", answer: "建议4核及以上CPU，主频4.5GHz以上，分配至少12GB运行内存（系统总内存需大于12G）。" },
            { category: "服务端与联机", question: "我和朋友联机，他也要加载VOXY地图吗？", answer: "不需要，VOXY是纯客户端模组。你可以把加载好的.voxy文件夹（位于存档目录下）发给你的朋友，让他放到自己客户端对应位置即可。" },
            { category: "服务端与联机", question: "联机或者服务器怎么让朋友使用我跑号的VOXY地图？", answer: "前往你的pcl2，找到对应版本的根目录，会有一个.voxy文件夹，打开之后再打开里面的saves文件夹，你就可以看到对应你游玩的服务器对应ip的文件夹，\n打开这个文件夹会看到两个东西，一个文件夹和一个json文件，把朋友给你的这两个文件复制到这里替换，然后重启游戏就可以了\n实在看不懂这个就去B站搜教程VOXY联机教程" },
            { category: "模组与投稿", question: "整合包里能自己加别的模组（MOD）吗？", answer: "可以，但是后果自负。添加模组后出现的任何崩溃或问题，需要自己解决，制作组没有义务提供支持。" },
            { category: "模组与投稿", question: "航空学模组的载具可以自己设计然后投稿吗？", answer: "可以。可以联系管理@Turin·Turambar进行投稿，被选中的载具可能会被加入官方\"可兑换载具\"库中。" },
            { category: "服务端与联机", question: "服务端启动后报错/卡住，或者联机时提示连接失败怎么办？", answer: "1. 确保服务端和客户端的整合包版本一致，推荐都使用群文件中的最新版。\n2. 服务端首次启动可能需要一些时间生成地图，请耐心等待。\n3. 如果是连接失败，检查服务器防火墙、端口映射或内网穿透配置是否正确。" },
            { category: "服务端与联机", question: "服务端的内存和CPU要求具体是多少？", answer: "服务端运行时建议分配至少12GB内存。CPU方面，建议主频在4.5GHz以上，核心数不低于4核。低于此配置可能导致服务器卡顿或崩溃。" },
            { category: "Bug与问题", question: "TACZ枪械模组什么时候能修好加回来？", answer: "TACZ模组与当前版本存在兼容性问题，已被暂时移除。制作组正在努力修复，但具体发布时间未知。请关注群公告，不建议手动添加，可能会引发崩溃。" },
            { category: "基础与获取", question: "整合包里的\"全量客户端\"和服务端有什么区别？", answer: "\"全量客户端\"是解压即玩的个人/联机版本，包含所有客户端MOD和资源。服务端是专门用于开服的版本，去掉了客户端MOD（如VOXY、光影等），只保留服务器运行必需的核心MOD。" },
            { category: "运行与优化", question: "创建世界或跑图时提示内存不足/崩溃？", answer: "此问题多由内存分配不足引起。强烈建议在PCL2启动器中将内存分配调整至12GB或以上。如果物理内存只有16GB，请关闭所有后台程序后再尝试。" },
            { category: "服务端与联机", question: "使用面板服开服需要注意什么？", answer: "不推荐使用面板服。面板服普遍存在超开、虚标性能的问题。如果需要多人稳定联机，建议租用VPS（如腾讯云、阿里云等）自行搭建服务端。" },
            { category: "游戏内容与玩法", question: "如何快速找到下界要塞或末地城？", answer: "原版方法比较困难。包内提供了\"结构指南针\"模组（或类似功能，如任务书中有指引），可以使用该物品快速定位指定结构。在JEI（物品管理器）中搜索\"指南针\"即可找到。" },
            { category: "游戏内容与玩法", question: "开局任务送的车掉坑里/找不到了怎么办？", answer: "1. 使用撬棍右键点击车辆可以回收。\n2. 如果车掉入虚空或彻底丢失，可以在创造模式中重新拿取一辆，或者使用命令 `/summon` 召唤。\n3. 开局建议先制作撬棍，以便随时回收车辆。" },
            { category: "服务端与联机", question: "我和朋友局域网联机，朋友需要一起跑VOXY地图吗？", answer: "不需要。VOXY是纯客户端的模组。作为主机，你跑好地图后，将存档目录下的 `.voxy` 隐藏文件夹发给朋友，他放入自己客户端的相同存档位置即可，具体操作方式可以在B站搜索VOXY联机教程。" },
            { category: "游戏内容与玩法", question: "航空学的飞机/飞船要怎么控制转向？", answer: "航空学的物理转向需要设计重心和推力线。简单来说，将推进器（如螺旋桨）安装在重心上方或下方会产生俯仰力矩。建议在Youtube或B站搜索\"航空学飞艇/飞机教程\"学习基础设计。" },
            { category: "游戏内容与玩法", question: "游戏里的\"思索\"功能（W键）是做什么的？", answer: "\"思索\"是机械动力模组的一个特色功能。当你拿着任意机械动力物品时，按下W键可以查看它的用途、合成配方以及相关的场景演示（Ponder），是学习模组玩法的最佳途径。" },
            { category: "模组与投稿", question: "我设计了一个载具，怎么投稿？", answer: "联系管理 @Turin·Turambar。投稿的载具应该是以`.nbt`格式保存的蓝图文件。请确保你的设计是原创且功能完善的，生存可用的载具更受欢迎。" }
        ];

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatAnswer(text) {
            if (!text) return "";
            let safe = text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
            let lines = safe.split(/\r?\n/);
            let formatted = '';
            for (let line of lines) {
                line = line.trim();
                if (line === "") { formatted += '<br>'; continue; }
                if (/^\d+\./.test(line) || /^[\-\*]\s/.test(line)) {
                    formatted += `<div style="margin-left: 1rem; margin-top: 0.2rem;">• ${line.replace(/^[\d\.\-\*]+\s*/, '')}</div>`;
                } else {
                    formatted += `<div style="margin-bottom: 0.3rem;">${line}</div>`;
                }
            }
            if (!formatted.includes('<div style="margin-left: 1rem;')) {
                formatted = `<div>${safe.replace(/\n/g, '<br>')}</div>`;
            }
            return formatted;
        }

        function renderCards(filterCat, searchTerm) {
            const container = document.getElementById('qaContainer');
            const statsSpan = document.getElementById('stats');
            let filtered = qaData;
            if (filterCat !== 'all') filtered = filtered.filter(item => item.category === filterCat);
            if (searchTerm.trim() !== '') {
                const term = searchTerm.trim().toLowerCase();
                filtered = filtered.filter(item => item.question.toLowerCase().includes(term) || item.answer.toLowerCase().includes(term));
            }
            statsSpan.innerText = `📄 共 ${filtered.length} 条问答  (总 ${qaData.length} 条)`;
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-result" style="text-align:center; padding:3rem; background:white; border-radius:1.25rem;">😥 没有找到相关问答，试试其他关键词或清空筛选～</div>';
                return;
            }
            let html = '';
            filtered.forEach(item => {
                html += `
                    <div class="qa-card">
                        <div class="card-header">
                            <span class="category-tag">${escapeHtml(item.category)}</span>
                            <div class="question">❓ ${escapeHtml(item.question)}</div>
                        </div>
                        <div class="card-body"><div class="answer">${formatAnswer(item.answer)}</div></div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        let currentCategory = 'all';
        let currentSearch = '';
        let debounceTimer;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(debounceTimer);
            currentSearch = e.target.value;
            debounceTimer = setTimeout(() => renderCards(currentCategory, currentSearch), 200);
        });
        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.addEventListener('click', function() {
                const cat = this.dataset.cat;
                currentCategory = cat;
                document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderCards(currentCategory, currentSearch);
            });
        });

        // 初始化
        renderChangelogCard();
        renderCards('all', '');
    </script>
</body>
</html>
